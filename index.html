  // ── GLOBAL SAFETY NET: catch async errors that bypass ErrorBoundary ─────
  window.addEventListener('unhandledrejection',e=>{
    const msg=String(e?.reason?.message||e?.reason||'');
    if(msg.includes('Firebase')||msg.includes('fetch')||msg.includes('network')||msg.includes('Failed to fetch')||msg.includes('timeout')) return;

  window.addEventListener('error',e=>{

  // ── STORAGE (Firebase + localStorage fallback) ──────────────────
  const fbTimeout = (promise, ms=3000) => Promise.race([
    promise,
    new Promise((_,rej)=>setTimeout(()=>rej(new Error('Firebase timeout')),ms))
  ]);

  // localStorage helpers (synchronous — instant)
  const lsGet = key => { try{ const v=localStorage.getItem(`wc26_${key}`); return v?JSON.parse(v):null; }catch{ return null; } };
  const lsSet = (key, val) => { try{ localStorage.setItem(`wc26_${key}`,JSON.stringify(val)); }catch{} };

  const storage = {
    // Write: localStorage immediately, Firebase in background (fire-and-forget)
    async set(key, value, shared=false) {
      const full = shared ? key : `${NS}-${key}`;
      lsSet(full, value);
      if (FB_ON) fbTimeout(db.collection('wc26').doc(full).set({ value: JSON.stringify(value) })).catch(()=>{});
    },
    // Read: localStorage instantly, no waiting for Firebase
    async get(key, shared=false) {
      const full = shared ? key : `${NS}-${key}`;
      return lsGet(full);
    },
    // Firebase-aware read: try localStorage first, then Firebase with timeout
    async getShared(key) {
      const cached = lsGet(key);
      if (!FB_ON) return cached;
      try {
        const snap = await fbTimeout(db.collection('wc26').doc(key).get());
        if (snap.exists) {
          const val = JSON.parse(snap.data().value);
          lsSet(key, val); // update cache
          return val;
        }
      } catch {}
      return cached;
    },
    async getJSON(key, shared=false) { return this.get(key, shared); },
    async setJSON(key, value, shared=false) { return this.set(key, value, shared); },
  };

  // ── DATA ─────────────────────────────────────────────────────────
  const GROUPS = {

  const GROUP_KEYS = Object.keys(GROUPS);

    const m = [];

      MATCH_PATTERN.forEach(([h,a],i) => m.push({

  // Pre-built index: group letter → match list (avoids 72-item filter on every render)
  const GROUP_MATCHES_BY_GROUP = GROUP_KEYS.reduce((acc,g)=>{ acc[g]=GROUP_MATCHES.filter(m=>m.group===g); return acc; },{});

  const R32_SLOTS = {

    83:{home:{type:'2',g:'K'},away:{type:'2',g:'L'}},

    87:{home:{type:'1',g:'K'},away:{type:'3',eligible:['D','E','I','J','L']}},

  const KO_FEED = {

  const TEAM_FLAGS = {

    'Belgium':'🇧🇪','Egypt':'🇪🇬','Iran':'🇮🇷','New Zealand':'🇳🇿',
    'Spain':'🇪🇸','Cape Verde':'🇨🇻','Saudi Arabia':'🇸🇦','Uruguay':'🇺🇾',
    'France':'🇫🇷','Senegal':'🇸🇳','Iraq':'🇮🇶','Norway':'🇳🇴',
    'Argentina':'🇦🇷','Algeria':'🇩🇿','Austria':'🇦🇹','Jordan':'🇯🇴',
    'Portugal':'🇵🇹','DR Congo':'🇨🇩','Uzbekistan':'🇺🇿','Colombia':'🇨🇴',
    'England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Croatia':'🇭🇷','Ghana':'🇬🇭','Panama':'🇵🇦',
  };

  const teamShort = t => ({
    'United States':'USA','Bosnia & Herz.':'Bosnia','South Korea':'S.Korea',
    'South Africa':'S.Africa','Czech Republic':'Czechia','Saudi Arabia':'S.Arabia',
    'New Zealand':'N.Zealand','Ivory Coast':'I.Coast','Cape Verde':'C.Verde',
  }[t]||t);

  const FIFA_RANKINGS = {
    'France':1,'Spain':2,'Argentina':3,'England':4,'Portugal':5,'Brazil':6,
    'Netherlands':7,'Morocco':8,'Belgium':9,'Germany':10,'Croatia':11,
    'Colombia':13,'Senegal':14,'Mexico':15,'United States':16,'Uruguay':17,
    'Japan':18,'Switzerland':19,'Iran':21,'Turkiye':22,'Ecuador':23,'Austria':24,
    'South Korea':25,'Australia':27,'Algeria':28,'Egypt':29,'Canada':30,
    'Norway':31,'Panama':33,'Ivory Coast':34,'Sweden':38,'Paraguay':40,
    'Czech Republic':41,'Scotland':43,'Tunisia':44,'DR Congo':46,'Uzbekistan':50,
    'Qatar':55,'Iraq':57,'South Africa':60,'Saudi Arabia':61,'Jordan':63,
    'Bosnia & Herz.':65,'Cape Verde':69,'Ghana':74,'Curacao':82,'Haiti':83,'New Zealand':85,
  };

  // Maps FIFA WC 2026 Live Data API team names → app team names
  const API_HOST = 'fifa-world-cup-2026-live-data.p.rapidapi.com';
  const API_TEAM_MAP = {
    'Korea Republic':'South Korea','USA':'United States','United States':'United States',
    "Côte d'Ivoire":'Ivory Coast',"Cote d'Ivoire":'Ivory Coast','Ivory Coast':'Ivory Coast',
    'Cabo Verde':'Cape Verde','Cape Verde':'Cape Verde',
    'Türkiye':'Turkiye','Turkey':'Turkiye','Turkiye':'Turkiye',
    'Bosnia and Herzegovina':'Bosnia & Herz.','Bosnia-Herzegovina':'Bosnia & Herz.','Bosnia':'Bosnia & Herz.','Bosnia & Herz.':'Bosnia & Herz.',
    'Congo DR':'DR Congo','DR Congo':'DR Congo','Democratic Republic of Congo':'DR Congo',
    'Iran':'Iran','IR Iran':'Iran','Islamic Republic of Iran':'Iran',
    'Curaçao':'Curacao','Curacao':'Curacao',
    'Czechia':'Czech Republic','Czech Republic':'Czech Republic',
    'South Korea':'South Korea','South Africa':'South Africa',
    'Saudi Arabia':'Saudi Arabia','New Zealand':'New Zealand',
  };
  const normTeam = n => n ? (API_TEAM_MAP[n] || n) : n;

  // Parses various API datetime formats → local HH:MM + short date label
  const formatMatchTime = raw => {
    if(!raw) return {time:'TBD',date:'',local:false};
    let s=String(raw).trim();
    // Normalise "YYYY-MM-DD HH:MM" (no T, no timezone) → treat as CEST (UTC+2)
    // The RapidAPI provider stores kickoff times in Central European Summer Time
    // e.g. "2026-06-19 00:00" CEST = 22:00 UTC = 6 PM EDT ✓
    if(/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}(:\d{2})?$/.test(s)){
      s=s.replace(' ','T')+'+05:00';
    }
    // Try ISO parse (handles 2026-06-17T20:00:00Z, 2026-06-17T20:00:00+00:00, and normalised above)
    const d=new Date(s);
    if(!isNaN(d.getTime())){
      const now=new Date();
      const isToday=d.toDateString()===now.toDateString();
      const isTomorrow=d.toDateString()===new Date(now.getTime()+86400000).toDateString();
      const timeStr=d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      const dateStr=isToday?'Today':isTomorrow?'Tomorrow':d.toLocaleDateString([],{month:'short',day:'numeric'});
      return{time:timeStr,date:dateStr,local:true};
    }
    // Fallback: try to extract HH:MM from raw string
    const m=s.match(/(\d{2}):(\d{2})/);
    return m?{time:`${m[1]}:${m[2]}`,date:s.slice(0,10),local:false}:{time:s.slice(11,16)||'TBD',date:s.slice(0,10),local:false};
  };

  const extractApiTeamName = tteam => {
    if(!tteam) return '';
    if(typeof tteam === 'string') return tteam;
    if(typeof tteam === 'object'){
      // Common direct fields
      const direct = tteam.name || tteam.team || tteam.teamName || tteam.team_name || tteam.displayName || tteam.common_name || tteam.shortName || tteam.fullName || tteam.title || tteam.country || tteam.country_name || tteam.nation || tteam.name_en || tteam.full_name || tteam.simpleName;
      if(direct && typeof direct === 'string') return direct;
      // Nested name objects
      if(tteam.name && typeof tteam.name === 'object') return tteam.name.common || tteam.name.official || tteam.name.en || '';
      // Try some other nested common fields
      if(tteam.team && typeof tteam.team === 'object') return tteam.team.name || tteam.team.common_name || tteam.team.displayName || '';
      // Last resort: scan values for a plausible string
      const isPlausible = s => typeof s==='string' && /[A-Za-zÀ-ÖØ-öø-ÿ\- ]{2,}/.test(s);
      const scan = (obj, depth=0) => {
        if(!obj || depth>2) return '';
        for(const k of Object.keys(obj)){
          const v = obj[k];
          if(isPlausible(v)) return v;
        }
        for(const k of Object.keys(obj)){
          const v = obj[k];
          if(typeof v === 'object'){
            const r = scan(v, depth+1); if(r) return r;
          }
        }
        return '';
      };
      return scan(tteam,0) || '';
    }
    return '';
  };

  const getUnderdog = (h, a) => {
    const hr=FIFA_RANKINGS[h], ar=FIFA_RANKINGS[a];
    if(!hr||!ar) return null;
    if(ar-hr>SCORING.underdogThreshold) return a;
    if(hr-ar>SCORING.underdogThreshold) return h;
    return null;
  };

  // Approximate last-kick-off times for each group-stage matchday (UTC+5).
  // Used to snapshot which joker was active when a matchday was played.
  const MATCHDAY_CUTOFFS = {
    1: new Date('2026-06-17T23:59:59+05:00').getTime(),
    2: new Date('2026-06-24T23:59:59+05:00').getTime(),
    3: new Date('2026-07-02T23:59:59+05:00').getTime(),
  };
  // Returns the joker ({team,group}) that was active when matchday `md` was played.
  // `history` is the jokerHistory array stored in predictions.
  // Falls back to `fallback` when no history is available (old data).
  const getJokerForMatchday = (history, md, fallback) => {
    if(!history||!history.length) return fallback;
    const cutoff=MATCHDAY_CUTOFFS[md];
    if(!cutoff) return fallback;
    const relevant=history.filter(e=>e.setAt<=cutoff);
    if(!relevant.length) return {team:null,group:null}; // joker not set before this matchday
    return relevant[relevant.length-1]; // last entry before cutoff
  };

  const getJokerMultiplier = (match, jTeam, jGroup) => {
    if(!jTeam&&!jGroup) return 1;
    const tm = jTeam&&(match.home===jTeam||match.away===jTeam);
    const gm = jGroup&&match.group===jGroup;
    if(tm&&gm) return 3;
    if(tm||gm) return 2;
    return 1;
  };

  const getSlotLabel = (matchId, side) => {
    if(matchId>=73&&matchId<=88) {
      const slot=R32_SLOTS[matchId]; if(!slot) return '?';
      const d = side==='home'?slot.home:slot.away;
      if(d.type==='1') return `${d.g}1`;
      if(d.type==='2') return `${d.g}2`;
      if(d.type==='3') return `3rd(${d.eligible.join('')})`;
    }
    if(matchId===103) return side==='home'?`L${KO_FEED[103].h}`:`L${KO_FEED[103].a}`;
    if(matchId>=89&&matchId<=104) {
      const f=KO_FEED[matchId]; if(!f) return '?';
      return side==='home'?`W${f.h}`:`W${f.a}`;
    }
    return '?';
  };

  // ── ALGORITHMS ──────────────────────────────────────────────────
  const computeGroupStandings = (gKey, preds) => {
    const teams=GROUPS[gKey], stats={};
    teams.forEach(t=>{stats[t]={team:t,P:0,W:0,D:0,L:0,GF:0,GA:0,GD:0,Pts:0}});
    (GROUP_MATCHES_BY_GROUP[gKey]||[]).forEach(m=>{
      const p=preds[m.id];
      if(!p||p.h===''||p.a===''||p.h==null) return;
      const h=parseInt(p.h),a=parseInt(p.a);
      if(isNaN(h)||isNaN(a)) return;
      stats[m.home].P++;stats[m.away].P++;
      stats[m.home].GF+=h;stats[m.home].GA+=a;
      stats[m.away].GF+=a;stats[m.away].GA+=h;
      if(h>a){stats[m.home].W++;stats[m.home].Pts+=3;stats[m.away].L++;}
      else if(a>h){stats[m.away].W++;stats[m.away].Pts+=3;stats[m.home].L++;}
      else{stats[m.home].D++;stats[m.away].D++;stats[m.home].Pts++;stats[m.away].Pts++;}
    });
    Object.values(stats).forEach(s=>s.GD=s.GF-s.GA);
    return Object.values(stats).sort((x,y)=>
      y.Pts!==x.Pts?y.Pts-x.Pts:y.GD!==x.GD?y.GD-x.GD:y.GF!==x.GF?y.GF-x.GF:x.team.localeCompare(y.team));
  };

  const computeAllStandings = preds => {
    const all={};
    GROUP_KEYS.forEach(g=>all[g]=computeGroupStandings(g,preds));
    return all;
  };

  const getBest3rdPlaceGroups = standings => {
    const thirds=GROUP_KEYS.map(g=>{
      const t=standings[g]?.[2]; if(!t) return null;
      return{...t,group:g,fifaRank:FIFA_RANKINGS[t.team]||999};
    }).filter(Boolean);
    thirds.sort((x,y)=>y.Pts!==x.Pts?y.Pts-x.Pts:y.GD!==x.GD?y.GD-x.GD:y.GF!==x.GF?y.GF-x.GF:x.fifaRank!==y.fifaRank?x.fifaRank-y.fifaRank:x.group.localeCompare(y.group));
    return thirds.slice(0,8).map(t=>t.group);
  };

  const assignThirdPlaceSlots = qualifyingGroups => {
    const slotIds=[79,85,81,74,82,77,87,80];
    const eligibility={
      74:['A','B','C','D','F'],77:['C','D','F','G','H'],79:['C','E','F','H','I'],
      80:['E','H','I','J','K'],81:['B','E','F','I','J'],82:['A','E','H','I','J'],
      85:['E','F','G','I','J'],87:['D','E','I','J','L'],
    };
    const res={};
    const solve = remaining => {
      if(remaining.length===0) return true;
      remaining.sort((a,b)=>
        slotIds.filter(s=>!res[s]&&eligibility[s].includes(a)).length -
        slotIds.filter(s=>!res[s]&&eligibility[s].includes(b)).length||a.localeCompare(b));
      const g=remaining[0];
      for(const slot of slotIds.filter(s=>!res[s]&&eligibility[s].includes(g))) {
        res[slot]=g;
        if(solve(remaining.slice(1))) return true;
        delete res[slot];
      }
      return false;
    };
    solve([...qualifyingGroups]);
    return res;
  };

  const buildBracket = (predictions, koPredictions) => {
    const standings=computeAllStandings(predictions);
    const completeGroups=new Set();
    GROUP_KEYS.forEach(g=>{
      const done=(GROUP_MATCHES_BY_GROUP[g]||[]).every(m=>{
        const p=predictions[m.id]; return p&&p.h!==''&&p.a!==''&&p.h!=null&&p.a!=null;
      });
      if(done) completeGroups.add(g);
    });
    const allGroupsComplete=completeGroups.size===12;
    const best3=allGroupsComplete?getBest3rdPlaceGroups(standings):[];
    const slotAssignment=allGroupsComplete?assignThirdPlaceSlots(best3):{};
    const bracket={};
    for(let mId=73;mId<=88;mId++){
      const slot=R32_SLOTS[mId];
      let home=null,away=null;
      if(slot.home.type==='1'&&completeGroups.has(slot.home.g)) home=standings[slot.home.g][0].team;
      else if(slot.home.type==='2'&&completeGroups.has(slot.home.g)) home=standings[slot.home.g][1].team;
      else if(slot.home.type==='3'&&allGroupsComplete){const g=slotAssignment[mId];home=g?standings[g][2].team:null;}
      if(slot.away.type==='1'&&completeGroups.has(slot.away.g)) away=standings[slot.away.g][0].team;
      else if(slot.away.type==='2'&&completeGroups.has(slot.away.g)) away=standings[slot.away.g][1].team;
      else if(slot.away.type==='3'&&allGroupsComplete){const g=slotAssignment[mId];away=g?standings[g][2].team:null;}
      const pred=koPredictions[mId]||{};
      bracket[mId]={id:mId,round:'R32',home,away,hScore:pred.h,aScore:pred.a,pkWinner:pred.pk};
    }
    const winnerOf=mId=>{
      const m=bracket[mId]; if(!m||!m.home||!m.away) return null;
      if(m.hScore===''||m.aScore===''||m.hScore==null||m.aScore==null) return null;
      const h=parseInt(m.hScore),a=parseInt(m.aScore);
      if(isNaN(h)||isNaN(a)) return null;
      if(h>a) return m.home; if(a>h) return m.away;
      if(m.pkWinner===m.home||m.pkWinner===m.away) return m.pkWinner;
      return null;
    };
    const loserOf=mId=>{const m=bracket[mId];const w=winnerOf(mId);if(!w) return null;return w===m.home?m.away:m.home;};
    [[89,96,'R16'],[97,100,'QF'],[101,102,'SF']].forEach(([s,e,rnd])=>{
      for(let mId=s;mId<=e;mId++){
        const f=KO_FEED[mId],pred=koPredictions[mId]||{};
        bracket[mId]={id:mId,round:rnd,home:winnerOf(f.h),away:winnerOf(f.a),hScore:pred.h,aScore:pred.a,pkWinner:pred.pk};
      }
    });
    const p103=koPredictions[103]||{};
    bracket[103]={id:103,round:'3rd',home:loserOf(KO_FEED[103].h),away:loserOf(KO_FEED[103].a),hScore:p103.h,aScore:p103.a,pkWinner:p103.pk};
    const p104=koPredictions[104]||{};
    bracket[104]={id:104,round:'Final',home:winnerOf(KO_FEED[104].h),away:winnerOf(KO_FEED[104].a),hScore:p104.h,aScore:p104.a,pkWinner:p104.pk};
    return{bracket,standings,best3,completeGroups,allGroupsComplete};
  };

  const buildActualBracket = (actualGroupResults, actualKoResults) => {
    const standings=computeAllStandings(actualGroupResults);
    const completeGroups=new Set();
    GROUP_KEYS.forEach(g=>{
      const done=(GROUP_MATCHES_BY_GROUP[g]||[]).every(m=>{const r=actualGroupResults[m.id];return r&&r.h!==''&&r.h!=null&&r.a!==''&&r.a!=null;});
      if(done) completeGroups.add(g);
    });
    const allComplete=completeGroups.size===12;
    const best3=allComplete?getBest3rdPlaceGroups(standings):[];
    const slotToGroup=allComplete?assignThirdPlaceSlots(best3):{};
    const bracket={};
    for(let mId=73;mId<=88;mId++){
      const slot=R32_SLOTS[mId],r=actualKoResults[mId]||{};
      let ah=null,aa=null;
      if(slot.home.type==='1'&&completeGroups.has(slot.home.g)) ah=standings[slot.home.g]?.[0]?.team;
      else if(slot.home.type==='2'&&completeGroups.has(slot.home.g)) ah=standings[slot.home.g]?.[1]?.team;
      else if(slot.home.type==='3'&&allComplete){const g=slotToGroup[mId];ah=g?standings[g]?.[2]?.team:null;}
      if(slot.away.type==='1'&&completeGroups.has(slot.away.g)) aa=standings[slot.away.g]?.[0]?.team;
      else if(slot.away.type==='2'&&completeGroups.has(slot.away.g)) aa=standings[slot.away.g]?.[1]?.team;
      else if(slot.away.type==='3'&&allComplete){const g=slotToGroup[mId];aa=g?standings[g]?.[2]?.team:null;}
      bracket[mId]={id:mId,round:'R32',home:ah||r.homeTeam||null,away:aa||r.awayTeam||null,hScore:r.h,aScore:r.a,pkWinner:r.pkWinner};
    }
    const winnerOf=mId=>{
      const m=bracket[mId],r=actualKoResults[mId];
      if(!m?.home||!m?.away||!r||r.h==null||r.h==='') return null;
      const h=parseInt(r.h),a=parseInt(r.a);
      if(isNaN(h)||isNaN(a)) return null;
      if(h>a) return m.home; if(a>h) return m.away;
      return r.pkWinner||null;
    };
    const loserOf=mId=>{const m=bracket[mId];const w=winnerOf(mId);if(!w||!m) return null;return w===m.home?m.away:m.home;};
    [[89,96,'R16'],[97,100,'QF'],[101,102,'SF']].forEach(([s,e,rnd])=>{
      for(let mId=s;mId<=e;mId++){
        const f=KO_FEED[mId],r=actualKoResults[mId]||{};
        bracket[mId]={id:mId,round:rnd,home:winnerOf(f.h),away:winnerOf(f.a),hScore:r.h,aScore:r.a,pkWinner:r.pkWinner};
      }
    });
    const r103=actualKoResults[103]||{};
    bracket[103]={id:103,round:'3rd',home:loserOf(KO_FEED[103].h),away:loserOf(KO_FEED[103].a),hScore:r103.h,aScore:r103.a,pkWinner:r103.pkWinner};
    const r104=actualKoResults[104]||{};
    bracket[104]={id:104,round:'Final',home:winnerOf(KO_FEED[104].h),away:winnerOf(KO_FEED[104].a),hScore:r104.h,aScore:r104.a,pkWinner:r104.pkWinner};

  };

  const scoreMatch = (pred,actual,homeTeam,awayTeam,isGroup=false) => {
    if(!pred||!actual) return{total:0,breakdown:{}};
    const ph=parseInt(pred.h),pa=parseInt(pred.a),ah=parseInt(actual.h),aa=parseInt(actual.a);
    if(isNaN(ph)||isNaN(pa)||isNaN(ah)||isNaN(aa)) return{total:0,breakdown:{}};
    const bd={};let total=0;
    if(ph===ah){bd.homeGoals=1;total+=1;}
    if(pa===aa){bd.awayGoals=1;total+=1;}
    const aR=ah>aa?'H':aa>ah?'A':'D',pR=ph>pa?'H':pa>ph?'A':'D';
    if(aR===pR){if(aR==='D'){bd.correctDraw=2;total+=2;}else{bd.correctResult=1;total+=1;}}
    if(ph===ah&&pa===aa){bd.exactBonus=1;total+=1;}
    if(isGroup&&aR===pR&&aR!=='D'&&homeTeam&&awayTeam){
      const winner=aR==='H'?homeTeam:awayTeam,loser=aR==='H'?awayTeam:homeTeam;
      const wr=FIFA_RANKINGS[winner],lr=FIFA_RANKINGS[loser];
      if(wr&&lr&&wr-lr>SCORING.underdogThreshold){bd.underdogBonus=2;total+=2;}
    }
    return{total,breakdown:bd};
  };

  const computeUserScore = (userPreds,actualGroupResults,actualKoResults,actualBonus={}) => {
    let groupPoints=0,koPoints=0,bracketPoints=0,bonusPoints=0;
    const detail={exactScores:0,correctResults:0,correctDraws:0,underdogWins:0,matches:0};
    const mdPts={1:0,2:0,3:0};
    const koRoundPts={R32:0,R16:0,QF:0,SF:0,'3rd':0,Final:0};
    const joker=userPreds.joker||{};
    const jokerHistory=userPreds.jokerHistory||null;
    GROUP_MATCHES.forEach(m=>{
      const actual=actualGroupResults[m.id];
      if(!actual||actual.h===''||actual.a===''||actual.h==null) return;
      const pred=userPreds.group?.[m.id];
      if(!pred||pred.h===''||pred.a===''||pred.h==null) return;
      const{total,breakdown}=scoreMatch(pred,actual,m.home,m.away,true);
      const ej=getJokerForMatchday(jokerHistory,m.matchday,joker);
      const mult=getJokerMultiplier(m,ej.team,ej.group);
      const pts=total*mult;
      groupPoints+=pts;mdPts[m.matchday]=(mdPts[m.matchday]||0)+pts;
      detail.matches++;
      if(breakdown.exactBonus) detail.exactScores++;
      if(breakdown.correctResult) detail.correctResults++;
      if(breakdown.correctDraw) detail.correctDraws++;
      if(breakdown.underdogBonus) detail.underdogWins++;
    });
    // KO scoring: bracket slots come from actual results — all users share the same bracket
    const{bracket:actualDerived}=buildActualBracket(actualGroupResults,actualKoResults);
    for(let mId=73;mId<=104;mId++){
      const actual=actualKoResults[mId];
      if(!actual||actual.h===''||actual.a===''||actual.h==null) continue;
      const am=actualDerived[mId]; if(!am||!am.home||!am.away) continue;
      const pred=userPreds.ko?.[mId]||{};
      if(pred.h===''||pred.h==null) continue;
      const pH=parseInt(pred.h),pA=parseInt(pred.a);
      const eH=parseInt(actual.h),eA=parseInt(actual.a);
      if(isNaN(pH)||isNaN(pA)||isNaN(eH)||isNaN(eA)) continue;
      let pts=0;
      const pRes=pH>pA?'H':pH<pA?'A':'D',aRes=eH>eA?'H':eH<eA?'A':'D';
      if(pRes===aRes) pts+=aRes==='D'?SCORING.correctDraw:SCORING.correctResult;
      if(pH===eH) pts+=1; if(pA===eA) pts+=1;
      if(pH===eH&&pA===eA){pts+=1;detail.exactScores++;}
      koPoints+=pts;const rnd=mId<=88?'R32':ROUND_FOR(mId);
      if(rnd) koRoundPts[rnd]=(koRoundPts[rnd]||0)+pts;
    }
    // Bonus
    const BONUS_KEYS=['winner','runnerUp','thirdPlace','goldenBoot'];
    const userBonus=userPreds.bonus||{};
    BONUS_KEYS.forEach(k=>{
      const actual=actualBonus[k],pick=userBonus[k];
      if(!actual||!pick) return;
      const a=String(actual).trim().toLowerCase(), p=String(pick).trim().toLowerCase();
      if(a===p||a.includes(p)||p.includes(a)){
        bonusPoints+=SCORING.bonusPick;
      }
    });
    // Tiebreak: parse user's tiebreak pick into seconds for leaderboard sorting
    const parseTiebreak=s=>{ if(!s) return null; const m=String(s).match(/^(\d{1,3}):([0-5]\d)$/); return m?parseInt(m[1])*60+parseInt(m[2]):null; };
    const tiebreakSecs=parseTiebreak(userBonus.tiebreak);
    return{
      total:groupPoints+koPoints+bracketPoints+bonusPoints,
      groupPoints,koPoints,bracketPoints,bonusPoints,detail,tiebreakSecs,
      sectionPts:{total:groupPoints+koPoints+bracketPoints+bonusPoints,group:groupPoints,md1:mdPts[1]||0,md2:mdPts[2]||0,md3:mdPts[3]||0,ko:koPoints+bracketPoints,...koRoundPts,bonus:bonusPoints},
    };
  };

  // Parse "MM:SS" tiebreak string → total seconds (shared use)
  const parseTiebreakTime=s=>{ if(!s) return null; const m=String(s).match(/^(\d{1,3}):([0-5]\d)$/); return m?parseInt(m[1])*60+parseInt(m[2]):null; };

  // ── SHARED UI HELPERS ────────────────────────────────────────────
  const SectionHeader = ({kicker,title,subtitle}) => (
    <div style={{marginBottom:8}}>
      <div className="micro-caps">{kicker}</div>
      <h2 className="display" style={{fontSize:34,fontWeight:700,margin:'4px 0',letterSpacing:'-.02em',lineHeight:1}}>{title}</h2>
      {subtitle&&<p style={{fontSize:13,color:'var(--ink-soft)',margin:'4px 0 0'}}>{subtitle}</p>}
    </div>
  );

  const ProgressBar = ({done,total,label}) => {
    if(!total) return null;
    const pct=Math.round((done/total)*100);
    return(
      <div style={{marginTop:16,padding:'12px 16px',background:'var(--cream2)',borderRadius:6}}>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'var(--ink-soft)',marginBottom:6}}>
          <span>{done}/{total} {label}</span><span className="mono" style={{fontWeight:700,color:pct===100?'var(--forest)':'var(--ink)'}}>{pct}%</span>
        </div>
        <div style={{height:4,background:'var(--line)',borderRadius:2,overflow:'hidden'}}>
          <div style={{height:'100%',background:pct===100?'var(--forest)':'var(--burgundy)',borderRadius:2,width:`${pct}%`,transition:'width .3s'}}/>
        </div>
      </div>
    );
  };

  const TeamSearchInput = ({value,onChange,placeholder='Search team…'}) => {
    const [q,setQ]=useState('');
    const [open,setOpen]=useState(false);
    const [hi,setHi]=useState(0);
    const ref=useRef();
    const filtered=q.length<1?[]:Object.values(GROUPS).flat().filter((t,i,a)=>a.indexOf(t)===i&&t.toLowerCase().includes(q.toLowerCase())).slice(0,8);
    useEffect(()=>{const fn=e=>{if(ref.current&&!ref.current.contains(e.target)){setOpen(false);setQ('');}};document.addEventListener('mousedown',fn);return()=>document.removeEventListener('mousedown',fn);},[]);
    const select=t=>{onChange(t);setQ('');setOpen(false);};
    const handleKey=e=>{
      if(!open) return;
      if(e.key==='ArrowDown'){e.preventDefault();setHi(h=>Math.min(h+1,filtered.length-1));}
      if(e.key==='ArrowUp'){e.preventDefault();setHi(h=>Math.max(h-1,0));}
      if(e.key==='Enter'&&filtered[hi]){e.preventDefault();select(filtered[hi]);}
      if(e.key==='Escape'){setOpen(false);setQ('');}
    };
    return(
      <div ref={ref} style={{position:'relative'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,padding:'9px 12px',border:`1px solid ${value?'var(--forest)':'var(--line)'}`,borderRadius:4,background:'white',cursor:'text'}} onClick={()=>{setOpen(true);setQ('');}}>
          {value?(
            <>
              <span style={{fontSize:16}}>{TEAM_FLAGS[value]||'⚽'}</span>
              <span style={{flex:1,fontSize:14,fontWeight:500}}>{value}</span>
              <button onClick={e=>{e.stopPropagation();onChange('');}} style={{background:'none',border:'none',cursor:'pointer',color:'var(--ink-soft)',fontSize:14,padding:0}}>✕</button>
            </>
          ):(
            <input autoComplete="off" value={q} onChange={e=>{setQ(e.target.value);setOpen(true);setHi(0);}} onKeyDown={handleKey} onFocus={()=>setOpen(true)} placeholder={placeholder} style={{flex:1,border:'none',outline:'none',fontFamily:'inherit',fontSize:14,background:'transparent',color:'var(--ink)'}}/>
          )}
        </div>
        {open&&filtered.length>0&&(
          <div className="scrollbar" style={{position:'absolute',zIndex:100,top:'100%',left:0,right:0,background:'white',border:'1px solid var(--line)',borderRadius:4,boxShadow:'0 4px 16px rgba(0,0,0,.12)',maxHeight:240,overflowY:'auto',marginTop:2}}>
            {filtered.map((t,i)=>(
              <div key={t} onMouseDown={()=>select(t)} onMouseEnter={()=>setHi(i)} style={{padding:'9px 12px',cursor:'pointer',background:i===hi?'var(--cream2)':'white',display:'flex',alignItems:'center',gap:10,borderBottom:i<filtered.length-1?'1px solid var(--line-soft)':'none'}}>
                <span style={{fontSize:18}}>{TEAM_FLAGS[t]||'⚽'}</span>
                <span style={{fontWeight:500,fontSize:14}}>{t}</span>
                {FIFA_RANKINGS[t]&&<span style={{marginLeft:'auto',fontSize:11,color:'var(--ink-soft)'}}>#{FIFA_RANKINGS[t]}</span>}
              </div>
            ))}
          </div>
        )}
      </div>
    );
  };

  const StandingsTable = ({standings}) => (
    <div style={{overflowX:'auto'}} className="scrollbar">
      <table style={{width:'100%',fontSize:12,borderCollapse:'collapse'}}>
        <thead><tr style={{borderBottom:'1px solid var(--line)'}}>
          {['#','Team','P','W','D','L','GD','Pts'].map(h=>(
            <th key={h} style={{padding:'3px 4px',fontSize:10,color:'var(--ink-soft)',fontWeight:600,textAlign:h==='Team'?'left':'center'}}>{h}</th>
          ))}
        </tr></thead>
        <tbody>
          {standings.map((s,i)=>(
            <tr key={s.team} style={{borderBottom:'1px solid var(--line-soft)',background:i<2?'rgba(27,94,63,.03)':'transparent'}}>
              <td style={{padding:'5px 4px',color:i<2?'var(--forest)':'var(--ink-soft)',fontWeight:600,textAlign:'center'}}>{i+1}</td>
              <td style={{padding:'5px 4px',display:'flex',alignItems:'center',gap:5}}>
                <Flag team={s.team} size={13}/>
                <span style={{fontWeight:i<2?600:400,whiteSpace:'nowrap'}}>{teamShort(s.team)}</span>
              </td>
              {[s.P,s.W,s.D,s.L,s.GD>0?`+${s.GD}`:s.GD].map((v,j)=>(
                <td key={j} className="mono" style={{padding:'5px 4px',textAlign:'center'}}>{v}</td>
              ))}
              <td className="mono" style={{padding:'5px 4px',textAlign:'center',fontWeight:700}}>{s.Pts}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );

  // ── MATCH CELLS (grid layout) ────────────────────────────────────
  const MatchCells = ({match,pred,actual,onSet,jokerMultiplier=1,locked:compLocked,matchLocked=false,kickoffMs=null}) => {
    const hasResult=actual&&actual.h!==''&&actual.h!=null&&actual.a!==''&&actual.a!=null;
    const resultLocked=hasResult;
    const isLocked=resultLocked||compLocked||matchLocked;
    const [nowMs,setNowMs]=useState(()=>Date.now());
    const minsUntilKickoff=kickoffMs&&!resultLocked&&!matchLocked?(kickoffMs-nowMs)/60000:null;
    const showCountdown=minsUntilKickoff!==null&&minsUntilKickoff>0&&minsUntilKickoff<=60;
    useEffect(()=>{
      if(!showCountdown) return;
      const t=setInterval(()=>setNowMs(Date.now()),15000); // refresh every 15s
      return()=>clearInterval(t);
    },[showCountdown]);
    const countdownStr=showCountdown?(()=>{
      const totalSec=Math.max(0,kickoffMs-nowMs)/1000;
      const m=Math.floor(totalSec/60),s=Math.floor(totalSec%60);
      return m>=60?`${Math.floor(m/60)}h ${m%60}m`:`${m}m ${String(s).padStart(2,'0')}s`;
    })():null;
    const ph=pred?.h??'',pa=pred?.a??'';
    const correct=resultLocked&&String(ph)===String(actual.h)&&String(pa)===String(actual.a);
    const underdog=getUnderdog(match.home,match.away);
    const jColor=jokerMultiplier===3?'var(--burgundy)':'var(--amber)';
    const jBg=jokerMultiplier===3?'rgba(159,27,27,.05)':jokerMultiplier===2?'rgba(214,137,42,.07)':'transparent';
    const hasPred=ph!==''&&pa!==''&&ph!=null&&pa!=null;
    const matchPts=resultLocked&&hasPred?scoreMatch(pred,actual,match.home,match.away,true).total*jokerMultiplier:0;
    const cell={padding:'8px 0',borderBottom:'1px solid var(--line-soft)',background:jBg};
    return(
      <>
        <div style={{...cell,display:'flex',alignItems:'center',justifyContent:'flex-end',gap:4,paddingRight:8,borderLeft:jokerMultiplier>1?`3px solid ${jColor}`:'3px solid transparent'}}>
          {FIFA_RANKINGS[match.home]&&<span style={{fontSize:9,color:match.home===underdog?'var(--burgundy)':'var(--ink-soft)',fontWeight:match.home===underdog?700:400}}>#{FIFA_RANKINGS[match.home]}</span>}
          <span style={{fontSize:13,fontWeight:match.home===underdog?600:500,color:match.home===underdog?'var(--burgundy)':'var(--ink)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',textAlign:'right'}}>{teamShort(match.home)}</span>
          <Flag team={match.home} size={15}/>
        </div>
        <div style={{...cell,display:'flex',alignItems:'center',gap:4,justifyContent:'center',padding:'8px 6px'}}>
          <input type="number" min="0" max="20" className="input-score" value={ph} onChange={e=>onSet(match.id,'h',e.target.value)} disabled={isLocked} style={isLocked?{background:matchLocked?'rgba(231,76,60,.08)':'var(--cream2)',color:'var(--ink-soft)'}:{}}/>
          <span style={{fontSize:12,color:'var(--ink-soft)'}}>:</span>
          <input type="number" min="0" max="20" className="input-score" value={pa} onChange={e=>onSet(match.id,'a',e.target.value)} disabled={isLocked} style={isLocked?{background:matchLocked?'rgba(231,76,60,.08)':'var(--cream2)',color:'var(--ink-soft)'}:{}}/>
        </div>
        <div style={{...cell,display:'flex',alignItems:'center',gap:4,paddingLeft:8}}>
          <Flag team={match.away} size={15}/>
          <span style={{fontSize:13,fontWeight:match.away===underdog?600:500,color:match.away===underdog?'var(--burgundy)':'var(--ink)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{teamShort(match.away)}</span>
          {FIFA_RANKINGS[match.away]&&<span style={{fontSize:9,color:match.away===underdog?'var(--burgundy)':'var(--ink-soft)',fontWeight:match.away===underdog?700:400}}>#{FIFA_RANKINGS[match.away]}</span>}
        </div>
        {(resultLocked||jokerMultiplier>1||showCountdown||matchLocked)&&(
          <div style={{gridColumn:'1/-1',display:'flex',alignItems:'center',justifyContent:'center',gap:8,padding:'2px 0 6px',borderBottom:'1px solid var(--line-soft)',background:jBg,marginTop:-1}}>
            {jokerMultiplier>1&&<span style={{fontSize:9,fontWeight:800,color:jColor,background:jokerMultiplier===3?'rgba(159,27,27,.1)':'rgba(214,137,42,.15)',padding:'1px 5px',borderRadius:3}}>{jokerMultiplier}× JOKER</span>}
            {showCountdown&&<span style={{fontSize:9,fontWeight:800,color:'#d4890a',background:'rgba(212,136,10,.12)',padding:'1px 6px',borderRadius:3}}>⏱ Locks in {countdownStr}</span>}
            {matchLocked&&!resultLocked&&<span style={{fontSize:9,fontWeight:800,color:'#e74c3c',background:'rgba(231,76,60,.1)',padding:'1px 5px',borderRadius:3}}>🔴 LIVE / LOCKED</span>}
            {resultLocked&&(
              <>
                <span style={{fontSize:10,color:'var(--ink-soft)'}}>Result:</span>
                <span className="mono" style={{fontSize:12,fontWeight:700,color:correct?'var(--forest)':matchPts>0?'var(--amber)':'var(--ink-soft)'}}>{actual.h}–{actual.a}</span>
                {correct&&<span style={{fontSize:9,color:'var(--forest)',fontWeight:700}}>EXACT ✓</span>}
                {hasPred&&<span style={{fontSize:10,fontWeight:800,color:matchPts>0?'var(--forest)':'var(--ink-soft)',background:matchPts>0?'rgba(27,94,63,.1)':'transparent',padding:matchPts>0?'1px 5px':'0',borderRadius:3}}>{matchPts>0?`+${matchPts} pts`:'0 pts'}</span>}
              </>
            )}
          </div>
        )}
      </>
    );
  };

  // ── GROUP CARD ───────────────────────────────────────────────────
  const GroupCard = ({groupKey,isOpen,onToggle,predictions,actualResults,onSet,standings,progress,jokerTeam,jokerGroup,jokerHistory=null,locked,lockedMatchIds=new Set(),kickoffTimes=new Map()}) => {
    const teams=GROUPS[groupKey];
    const matches=GROUP_MATCHES_BY_GROUP[groupKey]||[];
    const isJG=jokerGroup===groupKey,jTIG=jokerTeam&&teams.includes(jokerTeam);
    // Returns the effective joker for a specific match, accounting for historical changes
    const getMatchMult=(m)=>{
      const ej=getJokerForMatchday(jokerHistory,m.matchday,{team:jokerTeam,group:jokerGroup});
      return getJokerMultiplier(m,ej.team,ej.group);
    };
    const anyResults=matches.some(m=>{const r=actualResults?.[m.id];return r&&r.h!==''&&r.h!=null;});
    const groupPts=matches.reduce((sum,m)=>{
      const a=actualResults?.[m.id]; if(!a||a.h===''||a.h==null) return sum;
      const p=predictions[m.id]; if(!p||p.h===''||p.h==null) return sum;
      return sum+scoreMatch(p,a,m.home,m.away,true).total*getMatchMult(m);
    },0);
    const jColor=isJG&&jTIG?'var(--burgundy)':isJG||jTIG?'var(--amber)':null;
    return(
      <div className="card" style={{overflow:'hidden',borderColor:jColor||'var(--line)'}}>
        <button onClick={onToggle} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',background:'none',border:'none',padding:'14px 18px',textAlign:'left',cursor:'pointer'}}>
          <div style={{display:'flex',alignItems:'center',gap:14}}>
            <span className="group-letter" style={{color:jColor||'var(--burgundy)'}}>{groupKey}</span>
            <div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div className="display" style={{fontSize:15,fontWeight:600}}>Group {groupKey}</div>
                {isJG&&jTIG&&<span style={{fontSize:9,fontWeight:800,background:'var(--burgundy)',color:'#fff',borderRadius:3,padding:'2px 5px'}}>3× JOKER</span>}
                {isJG&&!jTIG&&<span style={{fontSize:9,fontWeight:800,background:'var(--amber)',color:'#fff',borderRadius:3,padding:'2px 5px'}}>2× JOKER</span>}
                {!isJG&&jTIG&&<span style={{fontSize:9,fontWeight:800,background:'var(--amber)',color:'#fff',borderRadius:3,padding:'2px 5px'}}>🃏 TEAM</span>}
              </div>
              <div style={{fontSize:11,color:'var(--ink-soft)',marginTop:1}}>
                {teams.map(t=><span key={t} style={{color:t===jokerTeam?'var(--amber)':'inherit',fontWeight:t===jokerTeam?700:400}}>{teamShort(t)}{t!==teams[teams.length-1]?' · ':''}</span>)}
              </div>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            {anyResults&&<span className="mono" style={{fontSize:12,fontWeight:800,color:'var(--forest)',background:'rgba(27,94,63,.1)',border:'1px solid var(--forest)',borderRadius:4,padding:'2px 7px'}}>{groupPts} pts</span>}
            <span className={`pill${progress.done===progress.total?' pill-success':''}`}>{progress.done}/{progress.total}</span>
            {isOpen?<ChevDown size={18}/>:<ChevRight size={18}/>}
          </div>
        </button>
        {isOpen&&(
          <div className="fadein" style={{borderTop:'1px solid var(--line)'}}>
            <div style={{padding:'12px 18px 4px'}}>
              <div className="micro-caps" style={{marginBottom:6}}>Matches</div>
              <div style={{display:'grid',gridTemplateColumns:'minmax(0,1fr) auto minmax(0,1fr)',alignItems:'center'}}>
                {[1,2,3].map(md=>(
                  <React.Fragment key={md}>
                    <div style={{gridColumn:'1/-1',fontSize:11,color:'var(--ink-soft)',fontWeight:500,padding:'6px 0 2px'}}>Matchday {md}</div>
                    {matches.filter(m=>m.matchday===md).map(m=>(
                      <MatchCells key={m.id} match={m} pred={predictions[m.id]||{h:'',a:''}} actual={actualResults?.[m.id]} onSet={onSet} jokerMultiplier={getMatchMult(m)} locked={locked} matchLocked={lockedMatchIds.has(m.id)} kickoffMs={kickoffTimes.get(m.id)||null}/>
                    ))}
                  </React.Fragment>
                ))}
              </div>
              {matches.some(m=>getUnderdog(m.home,m.away))&&(
                <div style={{fontSize:11,color:'var(--burgundy)',margin:'4px 0 6px',display:'flex',alignItems:'center',gap:5}}>
                  <span style={{fontWeight:700}}>Red team</span> = ranked 20+ spots lower — correctly predicting their win earns +2 bonus pts.
                </div>
              )}
            </div>
            <div style={{background:'var(--cream2)',padding:'12px 18px',borderTop:'1px solid var(--line)'}}>
              <div className="micro-caps" style={{marginBottom:6}}>Your predicted standings</div>
              <StandingsTable standings={standings||[]}/>
            </div>
          </div>
        )}
      </div>
    );
  };

  // ── PREDICTIONS VIEW ─────────────────────────────────────────────
  const PredictionsView = ({predictions,onSave,results,locked,lockedMatchIds=new Set(),kickoffTimes=new Map(),jumpToGroup=null}) => {
    const [openGroup,setOpenGroup]=useState('A');
    // Jump to a specific group when requested from outside (e.g. banner click)
    useEffect(()=>{ if(jumpToGroup) setOpenGroup(jumpToGroup); },[jumpToGroup]);
    const joker=predictions.joker||{};
    const todayDateStr=new Date().toLocaleDateString('sv'); // "YYYY-MM-DD" in local time
    const jokerLockedDate=predictions.jokerLockedDate||null;
    const jokerLockedToday=jokerLockedDate===todayDateStr;
    const setMatch=(mId,side,val)=>{
      if(locked) return;
      if(val!==''&&(isNaN(parseInt(val))||parseInt(val)<0||parseInt(val)>20)) return;
      onSave({...predictions,group:{...predictions.group,[mId]:{...predictions.group?.[mId],[side]:val}}});
    };
    const setJoker=(k,v)=>{
      if(locked||jokerLockedToday) return;
      const newJoker={...joker,[k]:v};
      const existingHist=predictions.jokerHistory||[];
      // On the very first change, snapshot the ORIGINAL joker as setAt=0 so all
      // prior matchdays that already happened still get the correct multiplier.
      const baseHist= existingHist.length===0 && (joker.team||joker.group)
        ? [{team:joker.team||null,group:joker.group||null,setAt:0}]
        : existingHist;
      const newHist=[...baseHist,{team:newJoker.team||null,group:newJoker.group||null,setAt:Date.now()}];
      onSave({...predictions,joker:newJoker,jokerHistory:newHist});
    };
    const submitJokerForToday=()=>{
      if(!joker.team&&!joker.group){alert('Please select a Joker Team and/or Joker Group first.');return;}
      if(!window.confirm(`Lock your Joker for today (${todayDateStr})?\n\n\u2022 Joker Team: ${joker.team||'(none)'}\n\u2022 Joker Group: ${joker.group?'Group '+joker.group:'(none)'}\n\nYou won\u2019t be able to change it until tomorrow.`)) return;
      onSave({...predictions,jokerLockedDate:todayDateStr});
    };
    const groupProgress=useMemo(()=>{
      const p={};
      GROUP_KEYS.forEach(g=>{
        const ms=GROUP_MATCHES_BY_GROUP[g]||[];
        const done=ms.filter(m=>{const r=predictions.group?.[m.id];return r&&r.h!==''&&r.a!==''&&r.h!=null&&r.a!=null;}).length;
        p[g]={done,total:ms.length};
      });
      return p;
    },[predictions]);
    const totalDone=Object.values(groupProgress).reduce((s,p)=>s+p.done,0);
    const standings=useMemo(()=>computeAllStandings(predictions.group||{}),[predictions]);
    const jTeamGroup=joker.team?GROUP_KEYS.find(g=>GROUPS[g].includes(joker.team)):null;
    const isTriple=joker.team&&joker.group&&jTeamGroup===joker.group;
    return(
      <div>
        <SectionHeader kicker="Stage 1 of 2" title="Group Stage" subtitle="Predict the score of all 72 group matches. Standings auto-update."/>
        {/* Joker */}
        <div className="card" style={{padding:18,marginTop:18,borderColor:jokerLockedToday?'var(--burgundy)':'var(--amber)',background:jokerLockedToday?'linear-gradient(135deg,rgba(159,27,27,.07) 0%,var(--paper) 60%)':'linear-gradient(135deg,rgba(214,137,42,.06) 0%,var(--paper) 60%)'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
            <span style={{fontSize:22}}>🃏</span>
            <div style={{flex:1}}>
              <div className="display" style={{fontSize:16,fontWeight:700}}>Joker Picks</div>
              <div style={{fontSize:12,color:'var(--ink-soft)'}}>Double points for all Joker Group matches and all Joker Team matches. Triple if both overlap.</div>
            </div>
            {jokerLockedToday&&(
              <div style={{flexShrink:0,padding:'5px 12px',borderRadius:6,background:'var(--burgundy)',color:'white',fontSize:11,fontWeight:700,letterSpacing:'.05em'}}>🔒 LOCKED TODAY</div>
            )}
          </div>
          {jokerLockedToday?(
            <div style={{padding:'14px 16px',borderRadius:6,background:'rgba(159,27,27,.06)',border:'1px solid var(--burgundy)',display:'flex',alignItems:'center',gap:14}}>
              <span style={{fontSize:28}}>🃏</span>
              <div>
                <div style={{fontWeight:700,fontSize:14,color:'var(--burgundy)'}}>Joker submitted for {jokerLockedDate}</div>
                <div style={{fontSize:12,color:'var(--ink-soft)',marginTop:3}}>
                  {joker.team&&<span>{TEAM_FLAGS[joker.team]||''} <strong>{joker.team}</strong> (team){joker.group?' · ':''}</span>}
                  {joker.group&&<span>Group <strong>{joker.group}</strong> (group)</span>}
                  {isTriple&&<span style={{marginLeft:8,fontSize:11,fontWeight:700,color:'var(--burgundy)',background:'rgba(159,27,27,.1)',padding:'1px 6px',borderRadius:3}}>3× TRIPLE</span>}
                </div>
                <div style={{fontSize:11,color:'var(--ink-soft)',marginTop:4}}>Unlocks automatically tomorrow.</div>
              </div>
            </div>
          ):(
            <>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <div>
                  <div className="micro-caps" style={{marginBottom:6}}>Joker Team</div>
                  <TeamSearchInput value={joker.team||''} onChange={v=>setJoker('team',v)} placeholder="Pick a team…"/>
                  {joker.team&&jTeamGroup&&<div style={{fontSize:11,color:'var(--ink-soft)',marginTop:4}}>{TEAM_FLAGS[joker.team]} plays in <strong>Group {jTeamGroup}</strong></div>}
                </div>
                <div>
                  <div className="micro-caps" style={{marginBottom:6}}>Joker Group</div>
                  <select value={joker.group||''} onChange={e=>setJoker('group',e.target.value)} style={{width:'100%',padding:'10px 12px',fontSize:14,border:`1px solid ${joker.group?'var(--forest)':'var(--line)'}`,borderRadius:4,background:'white',fontFamily:'inherit',color:'var(--ink)'}}>
                    <option value="">Pick a group…</option>
                    {GROUP_KEYS.map(g=><option key={g} value={g}>Group {g} — {GROUPS[g].map(t=>teamShort(t)).join(', ')}</option>)}
                  </select>
                </div>
              </div>
              {(joker.team||joker.group)&&(
                <div style={{marginTop:12,padding:'8px 12px',borderRadius:4,background:isTriple?'rgba(159,27,27,.08)':'rgba(214,137,42,.1)',border:`1px solid ${isTriple?'var(--burgundy)':'var(--amber)'}`}}>
                  <div style={{fontSize:12,fontWeight:600,color:isTriple?'var(--burgundy)':'var(--amber)'}}>
                    {isTriple?`🃏 TRIPLE: ${joker.team} matches score 3×`:`${joker.team?`${TEAM_FLAGS[joker.team]||''} ${joker.team} matches → 2×`:''} ${joker.group?`All Group ${joker.group} matches → 2×`:''}`}
                  </div>
                </div>
              )}
              <div style={{marginTop:14,display:'flex',flexDirection:'column',gap:8}}>
                <div style={{display:'flex',alignItems:'center',gap:12}}>
                  <button onClick={submitJokerForToday} disabled={!joker.team&&!joker.group} style={{padding:'9px 22px',borderRadius:6,border:'none',background:(joker.team||joker.group)?'var(--burgundy)':'var(--line)',color:(joker.team||joker.group)?'white':'var(--ink-soft)',fontWeight:700,fontSize:13,cursor:(joker.team||joker.group)?'pointer':'not-allowed',fontFamily:'inherit'}}>
                    🔒 Submit Joker for Today
                  </button>
                  {jokerLockedDate&&jokerLockedDate!==todayDateStr&&(
                    <span style={{fontSize:11,color:'var(--ink-soft)'}}>Last locked: {jokerLockedDate}</span>
                  )}
                  {!joker.team&&!joker.group&&(
                    <span style={{fontSize:11,color:'var(--ink-soft)',fontStyle:'italic'}}>Select a team and/or group first</span>
                  )}
                </div>
                {(joker.team||joker.group)&&!jokerLockedToday&&(
                  <div style={{display:'flex',alignItems:'center',gap:6,padding:'7px 12px',background:'rgba(214,137,42,.12)',border:'1px solid rgba(214,137,42,.4)',borderRadius:5}}>
                    <span style={{fontSize:13}}>⚠️</span>
                    <span style={{fontSize:11,color:'var(--amber)',fontWeight:600}}>Your joker is not locked yet — click Submit before today's matches start or anyone could change it.</span>
                  </div>
                )}
              </div>
            </>
          )}
        </div>
        <ProgressBar done={totalDone} total={72} label="matches predicted"/>
        <div style={{display:'flex',alignItems:'flex-start',gap:10,padding:'10px 14px',marginTop:12,background:'rgba(214,137,42,.08)',border:'1px solid rgba(214,137,42,.3)',borderRadius:6}}>
          <span style={{fontSize:16,lineHeight:1}}>⏰</span>
          <div style={{fontSize:12,color:'var(--ink)',lineHeight:1.5}}>
            <strong>Predictions lock 5 minutes before kick-off.</strong>{' '}
            Boxes marked <span style={{fontWeight:700,color:'#e74c3c'}}>🔴 LIVE</span> or <span style={{fontWeight:700,color:'#d4890a'}}>⏳ SOON</span> are frozen. Edit all others before the whistle.
          </div>
        </div>
        <div style={{marginTop:20,display:'flex',flexDirection:'column',gap:10}}>
          {GROUP_KEYS.map(g=>(
            <GroupCard key={g} groupKey={g} isOpen={openGroup===g} onToggle={()=>setOpenGroup(openGroup===g?null:g)} predictions={predictions.group||{}} actualResults={results.group} onSet={setMatch} standings={standings[g]} progress={groupProgress[g]} jokerTeam={joker.team||null} jokerGroup={joker.group||null} jokerHistory={predictions.jokerHistory||null} locked={locked} lockedMatchIds={lockedMatchIds} kickoffTimes={kickoffTimes}/>
          ))}
        </div>
      </div>
    );
  };

  // ── BRACKET MATCH CARD ───────────────────────────────────────────
  const BracketCard = ({match,pred,actual,onSet,onSetPk,gridColumn,gridRow,side,isFinal,isThirdPlace,bracketPts=0}) => {
    if(!match) return null;
    const hK=!!match.home,aK=!!match.away,hasTeams=hK&&aK;
    const resultLocked=actual&&actual.h!==''&&actual.h!=null&&actual.a!==''&&actual.a!=null;
    const up=pred||{h:'',a:''};
    const h=up.h,a=up.a;
    const scoresEntered=h!==''&&h!=null&&a!==''&&a!=null;
    const isDraw=scoresEntered&&parseInt(h)===parseInt(a);
    const pkChoice=up.pk;
    const needsPk=isDraw&&hasTeams&&pkChoice!==match.home&&pkChoice!==match.away;
    let advancer=null;
    if(scoresEntered&&hasTeams){
      const hi=parseInt(h),ai=parseInt(a);
      if(hi>ai) advancer=match.home; else if(ai>hi) advancer=match.away;
      else if(pkChoice===match.home||pkChoice===match.away) advancer=pkChoice;
    }
    let koPts=0;
    if(resultLocked&&scoresEntered){
      const eH=parseInt(actual.h),eA=parseInt(actual.a),pH=parseInt(h),pA=parseInt(a);
      const pR=pH>pA?'H':pH<pA?'A':'D',aR=eH>eA?'H':eH<eA?'A':'D';
      if(pR===aR) koPts+=aR==='D'?2:1;
      if(pH===eH) koPts+=1; if(pA===eA) koPts+=1;
      if(pH===eH&&pA===eA) koPts+=1;
    }
    const wStyle={gridColumn,gridRow,display:'flex',flexDirection:'column',justifyContent:'center',position:'relative',paddingRight:side==='left'?18:0,paddingLeft:side==='right'?18:0};
    const lineColor=advancer?'var(--forest)':'var(--line)';
    const STUB=9;
    return(
      <div style={wStyle}>
        {side==='left'&&(
          <>
            <div style={{position:'absolute',top:'50%',right:0,width:STUB+18,height:1,background:lineColor}}/>
          </>
        )}
        {side==='right'&&(
          <div style={{position:'absolute',top:'50%',left:0,width:STUB+18,height:1,background:lineColor}}/>
        )}
        <div style={{background:isFinal?'linear-gradient(180deg,#FFF8E5 0%,#FAEEC8 100%)':isThirdPlace?'var(--cream2)':'var(--paper)',border:`1px solid ${isFinal?'var(--amber)':advancer?'var(--forest)':'var(--line)'}`,borderRadius:4,padding:isFinal?'12px 12px 8px':'7px 8px',fontSize:12,opacity:1,position:'relative',zIndex:1,boxShadow:isFinal?'0 4px 14px rgba(214,137,42,.2)':'none'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3,height:12}}>
            <span style={{fontSize:9,color:'var(--ink-soft)',fontWeight:600}}>{isFinal?'⚜ FINAL ⚜':isThirdPlace?'3RD PLACE':`M${match.id}`}</span>
            {needsPk&&<span style={{fontSize:9,color:'var(--burgundy)',fontWeight:700}}>PICK PK ↓</span>}
          </div>
          {[[match.home,'h',hK],[match.away,'a',aK]].map(([team,side_,known])=>(
            <div key={side_} style={{display:'flex',alignItems:'center',gap:4,padding:'2px 0',opacity:(advancer && advancer!==team)?0.6:1}}>
              <span style={{fontSize:12,flexShrink:0}}>{known?(TEAM_FLAGS[team]||'⚽'):'○'}</span>
              <span style={{flex:1,fontSize:10,fontWeight:advancer===team?700:500,color:known?'var(--ink)':'var(--ink-soft)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',fontStyle:known?'normal':'italic'}}>{known?teamShort(team):getSlotLabel(match.id,side_==='h'?'home':'away')}</span>
              <input type="number" min="0" max="20" value={side_==='h'?h:a} onChange={e=>{const v=e.target.value;if(v===''||(parseInt(v)>=0&&parseInt(v)<=20)) onSet(match.id,side_,v);}} disabled={!hasTeams||resultLocked} style={{width:26,height:22,padding:0,textAlign:'center',fontFamily:'JetBrains Mono,monospace',fontSize:11,fontWeight:700,background:(!hasTeams||resultLocked)?'var(--cream2)':'white',border:'1px solid var(--line)',borderRadius:3,color:'var(--ink)',MozAppearance:'textfield'}}/>
            </div>
          ))}
          {isDraw&&hasTeams&&!resultLocked&&(
            <div style={{marginTop:4,padding:'4px 0 0',borderTop:'1px dashed var(--line)'}}>
              <div style={{fontSize:9,color:needsPk?'var(--burgundy)':'var(--ink-soft)',textAlign:'center',marginBottom:3,fontWeight:600}}>WINS ON PENS</div>
              <div style={{display:'flex',gap:3}}>
                {[match.home,match.away].map(t=>(
                  <button key={t} onClick={()=>onSetPk(match.id,t)} style={{flex:1,background:pkChoice===t?'var(--burgundy)':'transparent',color:pkChoice===t?'white':'var(--ink)',border:`1px solid ${pkChoice===t?'var(--burgundy)':'var(--line)'}`,borderRadius:3,padding:'2px 3px',cursor:'pointer',fontSize:9,fontWeight:600,fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',gap:2}}>
                    <Flag team={t} size={9}/> {teamShort(t).slice(0,10)}
                  </button>
                ))}
              </div>
            </div>
          )}
          {resultLocked&&(
            <div style={{marginTop:4,textAlign:'center'}}>
              <div style={{fontSize:9,color:'var(--forest)',fontWeight:600}}>
                {actual.homeTeam?teamShort(actual.homeTeam):'?'} <span className="mono">{actual.h}–{actual.a}</span> {actual.awayTeam?teamShort(actual.awayTeam):'?'}
              </div>
              {scoresEntered&&(koPts+bracketPts)>0&&(
                <span style={{display:'inline-block',fontSize:9,fontWeight:800,color:'var(--forest)',background:'rgba(27,94,63,.1)',padding:'1px 5px',borderRadius:3,marginTop:2}}>+{(koPts+bracketPts)} pts</span>
              )}
            </div>
          )}
        </div>
      </div>
    );
  };

  // ── BRACKET VIEW ─────────────────────────────────────────────────
  const BRACKET_POS = {
    74:{col:1,row:'2/4'},73:{col:1,row:'4/6'},77:{col:1,row:'6/8'},75:{col:1,row:'8/10'},
    83:{col:1,row:'10/12'},81:{col:1,row:'12/14'},82:{col:1,row:'14/16'},84:{col:1,row:'16/18'},
    89:{col:2,row:'2/6'},90:{col:2,row:'6/10'},93:{col:2,row:'10/14'},94:{col:2,row:'14/18'},
    97:{col:3,row:'2/10'},98:{col:3,row:'10/18'},
    101:{col:4,row:'2/10'},102:{col:4,row:'10/18'},
    104:{col:5,row:'2/18'},
    // Right side
    79:{col:9,row:'2/4'},80:{col:9,row:'4/6'},78:{col:9,row:'6/8'},76:{col:9,row:'8/10'},
    85:{col:9,row:'10/12'},87:{col:9,row:'12/14'},86:{col:9,row:'14/16'},88:{col:9,row:'16/18'},
    91:{col:8,row:'2/6'},92:{col:8,row:'6/10'},95:{col:8,row:'10/14'},96:{col:8,row:'14/18'},
    99:{col:7,row:'2/10'},100:{col:7,row:'10/18'},
  };

  const BracketView = ({predictions,onSave,results,locked}) => {
    const[mode,setMode]=useState('list');
    // Bracket slots are always driven by actual results — not individual user predictions
    const{bracket,completeGroups,allComplete:allGroupsComplete}=useMemo(()=>buildActualBracket(results.group||{},results.ko||{}),[results]);
    const setKoScore=(mId,side,val)=>{
      if(locked) return;
      if(val!==''&&(isNaN(parseInt(val))||parseInt(val)<0||parseInt(val)>20)) return;
      onSave({...predictions,ko:{...predictions.ko,[mId]:{...predictions.ko?.[mId],[side]:val}}});
    };
    const setKoPk=(mId,team)=>{
      if(locked) return;
      onSave({...predictions,ko:{...predictions.ko,[mId]:{...predictions.ko?.[mId],pk:team}}});
    };
    const koProgress=useMemo(()=>{
      let total=0,done=0;
      for(let mId=73;mId<=104;mId++){
        const m=bracket[mId]; if(!m?.home||!m?.away) continue;
        total++;
        const p=predictions.ko?.[mId];
        if(p&&p.h!==''&&p.a!==''&&p.h!=null&&p.a!=null){
          const isDraw=parseInt(p.h)===parseInt(p.a);
          if(!isDraw||(p.pk===m.home||p.pk===m.away)) done++;
        }
      }
      return{done,total};
    },[bracket,predictions]);
    const rounds=[
      {title:'Round of 32',ids:range(73,88)},{title:'Round of 16',ids:range(89,96)},
      {title:'Quarter-Finals',ids:range(97,100)},{title:'Semi-Finals',ids:[101,102]},
      {title:'3rd Place Play-off',ids:[103]},{title:'Final',ids:[104],isFinal:true},
    ];
    return(
      <div>
        <SectionHeader kicker="Stage 2 of 2" title="Knockout Bracket" subtitle="Bracket populates from actual match results — predict scores as teams are confirmed."/>
        <div style={{marginTop:14,display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          <div style={{display:'inline-flex',background:'var(--cream2)',borderRadius:6,padding:2,border:'1px solid var(--line)'}}>
            {[['list','List'],['bracket','Visual']].map(([k,l])=>(
              <button key={k} onClick={()=>setMode(k)} style={{background:mode===k?'var(--ink)':'transparent',color:mode===k?'var(--cream)':'var(--ink-soft)',border:'none',padding:'5px 12px',fontSize:12,fontWeight:600,borderRadius:4,cursor:'pointer',fontFamily:'inherit'}}>{l}</button>
            ))}
          </div>
        </div>
        {completeGroups.size<12&&(
          <div className="card" style={{marginTop:14,padding:12,background:'rgba(214,137,42,.07)',borderColor:'var(--amber)',display:'flex',gap:8,alignItems:'flex-start'}}>
            <AlertCirc size={16} style={{color:'var(--amber)',flexShrink:0,marginTop:1}}/>
            <div style={{fontSize:13}}><strong>{completeGroups.size}/12 groups completed.</strong> R32 teams will appear as each group's real matches finish.</div>
          </div>
        )}
        <ProgressBar done={koProgress.done} total={koProgress.total} label="knockout predictions complete"/>
        <div style={{marginTop:20}}>
          {mode==='list'?(
            rounds.map(({title,ids,isFinal})=>{
              const ms=ids.map(id=>bracket[id]).filter(m=>m?.home||m?.away);
              if(!ms.length) return null;
              return(
                <div key={title} style={{marginBottom:24}}>
                  <div style={{display:'flex',alignItems:'baseline',gap:10,marginBottom:10}}>
                    <h3 className="display" style={{fontSize:20,fontWeight:700,margin:0}}>{isFinal&&<Crown size={16} style={{display:'inline',color:'var(--amber)',marginRight:4,verticalAlign:'baseline'}}/>}{title}</h3>
                    <div style={{flex:1,height:1,background:'var(--line)'}}/>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:isFinal?'1fr':'repeat(auto-fill,minmax(240px,1fr))',gap:8}}>
                    {ms.map(m=>(
                      <div key={m.id} className="card" style={{padding:10,background:isFinal?'#FFF8E5':'var(--paper)',borderColor:isFinal?'var(--amber)':'var(--line)'}}>
                        <div style={{fontSize:10,color:'var(--ink-soft)',fontWeight:600,marginBottom:6}}>{isFinal?'⚜ FINAL':isThirdPlace?'3RD PLACE':`M${m.id}`} {isFinal&&<Trophy size={10} style={{display:'inline',color:'var(--amber)'}}/>}</div>
                        {[[m.home,'h',true],[m.away,'a',true]].map(([team,side,_])=>{
                          const known=!!team; const pred=predictions.ko?.[m.id]||{};
                          const v=side==='h'?pred.h??'':pred.a??'';
                          const resultLocked=results.ko?.[m.id]&&results.ko[m.id].h!==''&&results.ko[m.id].h!=null;
                          return(
                            <div key={side} style={{display:'flex',alignItems:'center',gap:6,padding:'3px 0'}}>
                              <span style={{fontSize:14}}>{known?(TEAM_FLAGS[team]||'⚽'):'○'}</span>
                              <span style={{flex:1,fontSize:12,fontWeight:500,color:known?'var(--ink)':'var(--ink-soft)',fontStyle:known?'normal':'italic'}}>{known?teamShort(team):getSlotLabel(m.id,side==='h'?'home':'away')}</span>
                              <input type="number" min="0" max="20" className="input-score" value={v} onChange={e=>{const nv=e.target.value;if(nv===''||(parseInt(nv)>=0&&parseInt(nv)<=20)) setKoScore(m.id,side,nv);}} disabled={!m.home||!m.away||resultLocked||locked} style={{width:34,height:30,fontSize:12,background:(!m.home||!m.away||resultLocked||locked)?'var(--cream2)':'white'}}/>
                            </div>
                          );
                        })}
                        {(()=>{
                          const p=predictions.ko?.[m.id]||{}; const isDraw=p.h!==''&&p.a!==''&&p.h!=null&&parseInt(p.h)===parseInt(p.a);
                          if(!isDraw||!m.home||!m.away||locked||(results.ko?.[m.id]?.h!=null&&results.ko[m.id].h!=='')) return null;
                          return(
                            <div style={{marginTop:6,paddingTop:6,borderTop:'1px dashed var(--line)'}}>
                              <div style={{fontSize:10,color:p.pk!==m.home&&p.pk!==m.away?'var(--burgundy)':'var(--ink-soft)',fontWeight:600,marginBottom:4,textAlign:'center'}}>Wins on pens:</div>
                              <div style={{display:'flex',gap:4}}>
                                {[m.home,m.away].map(t=>(
                                  <button key={t} onClick={()=>setKoPk(m.id,t)} style={{flex:1,background:p.pk===t?'var(--burgundy)':'transparent',color:p.pk===t?'white':'var(--ink)',border:`1px solid ${p.pk===t?'var(--burgundy)':'var(--line)'}`,borderRadius:3,padding:'3px',cursor:'pointer',fontSize:11,fontWeight:600,fontFamily:'inherit'}}>
                                    <Flag team={t} size={11}/> {teamShort(t).slice(0,8)}
                                  </button>
                                ))}
                              </div>
                            </div>
                          );
                        })()}
                        {results.ko?.[m.id]&&results.ko[m.id].h!==''&&results.ko[m.id].h!=null&&(
                          <div style={{marginTop:4,textAlign:'center',fontSize:11,color:'var(--forest)',fontWeight:600}}>
                            Result: {results.ko[m.id].homeTeam?teamShort(results.ko[m.id].homeTeam):'?'} {results.ko[m.id].h}–{results.ko[m.id].a} {results.ko[m.id].awayTeam?teamShort(results.ko[m.id].awayTeam):'?'}
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              );
            })
          ):(
            <div className="scrollbar" style={{overflowX:'auto',margin:'0 -16px',padding:'8px 16px 12px'}}>
              <div style={{display:'grid',gridTemplateColumns:'170px 156px 148px 148px 178px 148px 148px 156px 170px',gridTemplateRows:'28px repeat(17,minmax(38px,1fr))',columnGap:16,minWidth:1400,minHeight:700}}>
                {['R32','R16','QF','SF','FINAL','SF','QF','R16','R32'].map((l,i)=>(
                  <div key={i} style={{gridColumn:i+1,gridRow:1,fontSize:10,fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',color:l==='FINAL'?'var(--burgundy)':'var(--ink-soft)',textAlign:'center',padding:'6px 0',borderBottom:'1px solid var(--line)'}}>{l}</div>
                ))}
                {Object.entries(BRACKET_POS).map(([mid,pos])=>{
                  const m=bracket[parseInt(mid)];
                  if(!m) return null;
                  return(
                    <BracketCard key={mid} match={m} pred={predictions.ko?.[parseInt(mid)]} actual={results.ko?.[parseInt(mid)]} onSet={setKoScore} onSetPk={setKoPk} gridColumn={pos.col} gridRow={pos.row} side={pos.col<=5?'left':'right'} isFinal={parseInt(mid)===104}/>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      </div>
    );
  };

  // ── BONUS PICKS ──────────────────────────────────────────────────
  const BonusView = ({predictions,onSave,results,locked}) => {
    const bonus=predictions.bonus||{};
    const actualBonus=results.bonus||{};
    const setBonus=(k,v)=>{if(!locked) onSave({...predictions,bonus:{...bonus,[k]:v}});};
    const picks=[
      {key:'winner',label:'World Cup Winner',icon:'🏆',isTeam:true},
      {key:'runnerUp',label:'Runner-Up',icon:'🥈',isTeam:true},
      {key:'thirdPlace',label:'3rd Place',icon:'🥉',isTeam:true},
      {key:'goldenBoot',label:'Golden Boot (Player)',icon:'⚽',isTeam:false},
    ];
    return(
      <div>
        <SectionHeader kicker="4 × 10 points" title="Bonus Picks" subtitle="Independent of your bracket — 10 pts each if correct."/>
        <div className="card" style={{padding:12,marginTop:16,background:'rgba(214,137,42,.07)',borderColor:'var(--amber)'}}>
          <div style={{fontSize:13}}>Your Winner pick here is <strong>independent</strong> of your bracket — you can back a different team.</div>
        </div>
        <div style={{marginTop:16,display:'flex',flexDirection:'column',gap:12}}>
          {picks.map(({key,label,icon,isTeam})=>{
            const pick=bonus[key],actual=actualBonus[key];
            const actualLocked=!!actual;
            const correct=actualLocked&&pick&&(
              actual.trim().toLowerCase()===pick.trim().toLowerCase()||
              actual.trim().toLowerCase().includes(pick.trim().toLowerCase())||
              pick.trim().toLowerCase().includes(actual.trim().toLowerCase())
            );
            return(
              <div key={key} className="card" style={{padding:18,borderColor:correct?'var(--forest)':'var(--line)',background:correct?'rgba(27,94,63,.04)':'var(--paper)'}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <span style={{fontSize:26}}>{icon}</span>
                    <div>
                      <div className="display" style={{fontSize:16,fontWeight:700}}>{label}</div>
                      <div style={{fontSize:12,color:'var(--ink-soft)'}}>10 pts if correct</div>
                    </div>
                  </div>
                  <span className="pill pill-warn" style={{fontWeight:700}}>+10</span>
                </div>
                {isTeam?(
                  <TeamSearchInput value={pick||''} onChange={v=>setBonus(key,v)} placeholder="Pick a team…"/>
                ):(
                  <input value={pick||''} onChange={e=>setBonus(key,e.target.value)} placeholder="Player name…" disabled={locked} style={{width:'100%',padding:'10px 12px',fontSize:14,border:`1px solid ${pick?'var(--forest)':'var(--line)'}`,borderRadius:4,background:'white',fontFamily:'inherit',color:'var(--ink)'}}/>
                )}
                {actualLocked&&(
                  <div style={{marginTop:10,display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontSize:12,color:'var(--ink-soft)'}}>Actual:</span>
                    {isTeam&&TEAM_FLAGS[actual]&&<span style={{fontSize:16}}>{TEAM_FLAGS[actual]}</span>}
                    <span style={{fontWeight:700,color:correct?'var(--forest)':'var(--ink)'}}>{actual}</span>
                    {correct&&<span className="pill pill-success" style={{fontSize:10}}>+10 pts ✓</span>}
                  </div>
                )}
              </div>
            );
          })}
          <div className="card" style={{padding:18}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
              <span style={{fontSize:26}}>⏱️</span>
              <div>
                <div className="display" style={{fontSize:16,fontWeight:700}}>Tie-Break</div>
                <div style={{fontSize:12,color:'var(--ink-soft)'}}>Time of first goal in the Final (MM:SS) — closest guess wins ties</div>
              </div>
            </div>
            <input value={bonus.tiebreak||''} onChange={e=>setBonus('tiebreak',e.target.value)} placeholder="e.g. 23:45" disabled={locked} style={{width:'100%',padding:'10px 12px',fontSize:14,border:'1px solid var(--line)',borderRadius:4,fontFamily:'JetBrains Mono,monospace',background:'white',color:'var(--ink)'}}/>
          </div>
        </div>
      </div>
    );
  };

  // ── LEADERBOARD ──────────────────────────────────────────────────
  const LeaderboardView = React.memo(({participants,allPredictions,results}) => {
    const actualTiebreakSecs=parseTiebreakTime(results.bonus?.tiebreak);
    const scores=useMemo(()=>{
      try{
        const rows=participants.map(p=>{
          try{
            const preds=allPredictions[p]||{group:{},ko:{}};
            const score=computeUserScore(preds,results.group||{},results.ko||{},results.bonus||{});
            return{name:p,...score};
          }catch(e){ console.warn('Score error for',p,e); return{name:p,total:0,groupPoints:0,koPoints:0,bracketPoints:0,bonusPoints:0,tiebreakSecs:null,detail:{exactScores:0,correctResults:0,correctDraws:0,underdogWins:0,matches:0},sectionPts:{}}; }
        });
        rows.sort((a,b)=>{
          if(b.total!==a.total) return b.total-a.total;
          // Tiebreak: closest guess to actual first-goal time in the Final
          if(actualTiebreakSecs!=null){
            const aDiff=a.tiebreakSecs!=null?Math.abs(a.tiebreakSecs-actualTiebreakSecs):Infinity;
            const bDiff=b.tiebreakSecs!=null?Math.abs(b.tiebreakSecs-actualTiebreakSecs):Infinity;
            if(aDiff!==bDiff) return aDiff-bDiff;
          }
          return 0;
        });
        return rows;
      }catch(e){ console.warn('Leaderboard scores error:',e); return []; }
    },[participants,allPredictions,results,actualTiebreakSecs]);

  const LiveDataView = React.memo(({adminRole}) => {

    const[liveAutoTs,setLiveAutoTs]=useState(null); // last auto-refresh timestamp

    const[espnPreview,setEspnPreview]=useState(null); // {panelKey,payload,isStandings,summary,rows} — confirm before save

    // ── Auto-load cached data from Firestore on mount ─────────────────────────
    useEffect(()=>{
      const keys=['results','standings','scorers','upcoming','live'];
