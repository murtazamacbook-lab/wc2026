const formatMatchTime = raw => {
  if (!raw) return {
    time: 'TBD',
    date: '',
    local: false
  };
  let s = String(raw).trim();
  // Normalise "YYYY-MM-DD HH:MM" (no T, no timezone) → treat as CEST (UTC+2)
  // The RapidAPI provider stores kickoff times in Central European Summer Time
  // e.g. "2026-06-19 00:00" CEST = 22:00 UTC = 6 PM EDT ✓
  if (/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}(:\d{2})?$/.test(s)) {
    s = s.replace(' ', 'T') + '+05:00';
  }
  // Try ISO parse (handles 2026-06-17T20:00:00Z, 2026-06-17T20:00:00+00:00, and normalised above)
  const d = new Date(s);
  if (!isNaN(d.getTime())) {
    const now = new Date();
    const isToday = d.toDateString() === now.toDateString();
    const isTomorrow = d.toDateString() === new Date(now.getTime() + 86400000).toDateString();
    const timeStr = d.toLocaleTimeString([], {
      hour: '2-digit',
      minute: '2-digit'
    });
    const dateStr = isToday ? 'Today' : isTomorrow ? 'Tomorrow' : d.toLocaleDateString([], {
      month: 'short',
      day: 'numeric'
    });
    return {
      time: timeStr,
      date: dateStr,
      local: true
    };
  }
  // Fallback: try to extract HH:MM from raw string
  const m = s.match(/(\d{2}):(\d{2})/);
  return m ? {
    time: `${m[1]}:${m[2]}`,
    date: s.slice(0, 10),
    local: false
  } : {
    time: s.slice(11, 16) || 'TBD',
    date: s.slice(0, 10),
    local: false
  };
};

    if (tteam.team && typeof tteam.team === 'object') return tteam.team.name || tteam.team.common_name || tteam.team.displayName || '';

      if (!obj || depth > 2) return '';
      for (const k of Object.keys(obj)) {

        if (isPlausible(v)) return v;
      }
      for (const k of Object.keys(obj)) {
        const v = obj[k];
        if (typeof v === 'object') {
          const r = scan(v, depth + 1);
